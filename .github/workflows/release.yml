name: Release

# Two entry points:
#   • push a tag `vX.Y.Z`  → REAL production release: npm publish (provenance) + deploy the Worker,
#                            then cut a GitHub Release with that version's CHANGELOG section as notes.
#   • workflow_dispatch    → rehearsal/ops: pick an environment + dry-run (default: staging, dry-run).
#                            The "tagged-release dry-run hits staging" check is this, with defaults.
#
# PRE-TAG CHECKLIST (a `vX.Y.Z` tag deploys STRAIGHT to production — there is no staging gate in the
# tag path). Sign-in fails CLOSED without its secret, and the gate job below never exercises the mint
# path, so a missing secret is a SILENT total login outage. Before tagging:
#   1. Set the Worker secret in BOTH envs (once, and after any rotation):
#        wrangler secret put GITHUB_CLIENT_SECRET --env staging
#        wrangler secret put GITHUB_CLIENT_SECRET --env production
#      Value = the ymmv GitHub OAuth app's client secret (GitHub → Settings → Developer settings →
#      OAuth Apps → ymmv). GITHUB_CLIENT_ID is a committed @ymmv/shared constant, not a secret.
#   2. Rehearse on staging (workflow_dispatch → staging) and run a real `ymmv login` against it. Only
#      tag once that succeeds.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare environment to target
        type: choice
        options: [staging, production]
        default: staging
      dry_run:
        description: "Dry run: no npm publish, no deploy (config + bundle validated only)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # Don't cancel an in-flight release; serialize per ref instead.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve what this run does, in one place. Tag push is always a real production release;
  # dispatch honors its inputs.
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.x.outputs.environment }}
      dry_run: ${{ steps.x.outputs.dry_run }}
      version: ${{ steps.x.outputs.version }}
      db_name: ${{ steps.x.outputs.db_name }}
    steps:
      - id: x
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            env_name=production
            dry=false
            version="${GITHUB_REF_NAME#v}"
          else
            env_name="${{ inputs.environment }}"
            dry="${{ inputs.dry_run }}"
            version="0.0.0-dispatch.${GITHUB_RUN_NUMBER}"
            # Real production changes go through a version tag (which also publishes the CLI + provenance).
            # A dispatch may rehearse prod (dry-run) and really-deploy STAGING, but never really-deploy prod.
            if [ "$env_name" = "production" ] && [ "$dry" != "true" ]; then
              echo "Forcing dry_run=true: production deploys go through a version tag, not workflow_dispatch."
              dry=true
            fi
          fi
          if [ "$env_name" = "production" ]; then db=ymmv; else db=ymmv-staging; fi
          {
            echo "environment=$env_name"
            echo "dry_run=$dry"
            echo "version=$version"
            echo "db_name=$db"
          } >> "$GITHUB_OUTPUT"
          echo "Release: env=$env_name dry_run=$dry version=$version db=$db"

  # Pre-flight gate — the same checks CI runs, on the LTS floor. Nothing publishes/deploys if red.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Cache the fonts Astro downloads at build (Fontshare + Google) so the release build reuses them
      # instead of re-fetching; a provider outage then can't fail a cached build on the deploy path.
      - name: Cache Astro font downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/web/node_modules/.astro/fonts
          key: astro-fonts-${{ runner.os }}-${{ hashFiles('packages/web/astro.config.mjs') }}
          restore-keys: astro-fonts-${{ runner.os }}-
      - run: pnpm -r build
      - run: pnpm typecheck
      - run: pnpm test

  # Publish the CLI to npm with provenance. Real publish ONLY on a tag push (one npm registry, no
  # "staging npm"); every dispatch is --dry-run regardless of environment. Runs AFTER deploy-worker so
  # a tag release is sequenced (deploy the worker first, then publish the CLI) — no half-release if the
  # deploy fails, and the brief in-between window is the backward-compatible one (new worker, old CLI).
  # NOTE: `npm publish` is NOT idempotent — re-running the whole workflow after a successful publish
  # 403s at the registry. To retry a partially failed release, use `gh run rerun <id> --failed`.
  # If THIS job is the failed one, first check `npm view ymmv-cli@<version>`: if the version exists,
  # the publish landed despite the failure — don't rerun it; cut the GitHub Release by hand instead.
  publish-cli:
    needs: [prep, gate, deploy-worker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # OIDC: Trusted Publishing auth + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x. Pinned to the 11
      # major, NOT `@latest`: npm 12.0.0's provenance publish is broken (npm/cli#9722 — `npm publish`
      # dies with "Cannot find module 'sigstore'" from libnpmpublish/lib/provenance.js), and an
      # unpinned @latest silently put it on the publish path. Cross this major deliberately.
      # NOTE: the dispatch rehearsal runs `npm publish --dry-run`, which never exercises the
      # provenance/OIDC path — a staging rehearsal cannot catch a failure of this class.
      - run: npm install -g npm@11
      - run: pnpm install --frozen-lockfile
      # Build the bundle (inlines the private @ymmv/shared) and stamp the release version.
      - run: pnpm --filter @ymmv/shared build
      - run: pnpm --filter ymmv-cli build
      - name: Stamp version
        # Pass via env, never inline ${{ }} into the script: a tag name is attacker-influenced and
        # would otherwise be shell-injected on the runner that holds OIDC npm-publish rights.
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: npm pkg set version="$VERSION"
        working-directory: packages/cli
      - name: Publish to npm (Trusted Publishing + provenance)
        if: github.event_name == 'push' && needs.prep.outputs.dry_run == 'false'
        # No NODE_AUTH_TOKEN: auth is OIDC via the npm Trusted Publisher (id-token: write above).
        # Provenance is automatic under Trusted Publishing.
        run: npm publish
        working-directory: packages/cli
      - name: Publish (dry run)
        if: github.event_name != 'push' || needs.prep.outputs.dry_run != 'false'
        run: npm publish --dry-run
        working-directory: packages/cli

  # Deploy the unified Worker. The CLOUDFLARE_ENV build bakes the right name/bindings/routes into the
  # adapter's generated config, then wrangler deploys THAT (no --env). D1 migrations run against the
  # source config (--env). Dry-run validates config + bundle offline (no Cloudflare secrets needed).
  # CLOUDFLARE_ENV is scoped to the build step ONLY (see below) — it must NOT reach `wrangler deploy`.
  deploy-worker:
    needs: [prep, gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ymmv/shared build
      - name: Cache Astro font downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/web/node_modules/.astro/fonts
          key: astro-fonts-${{ runner.os }}-${{ hashFiles('packages/web/astro.config.mjs') }}
          restore-keys: astro-fonts-${{ runner.os }}-
      # Astro 7 bakes env at build time (CLOUDFLARE_ENV) — one build per environment. Scope
      # CLOUDFLARE_ENV to THIS step only: it selects the env for the baked config (name + bindings +
      # routes). If it also reached `wrangler deploy` below, wrangler would re-apply the env to the
      # already-baked config (which has no env blocks) and append `-<env>` to the worker name
      # (ymmv-production -> ymmv-production-production), diverging from the name that
      # `wrangler secret put --env <env>` targets — a silent secret/worker-name mismatch.
      - name: Build Worker for ${{ needs.prep.outputs.environment }}
        run: pnpm --filter @ymmv/web build
        env:
          CLOUDFLARE_ENV: ${{ needs.prep.outputs.environment }}
      # Guard against a silent rate-limit fail-open: RL_WRITE MUST be in the env-baked config, or the
      # handler's `if (!limiter) return null` would disable write rate limiting in production.
      - name: Assert RL_WRITE is bound
        run: grep -q "RL_WRITE" dist/server/wrangler.json || { echo "::error::RL_WRITE missing from generated config — rate limiting would silently fail open"; exit 1; }
        working-directory: packages/web
      # Same guard for the mint per-IP cap: RL_AUTH must be in the env-baked config, or checkAuthRateLimit's
      # `if (!limiter) return null` would disable the login flood cap in production.
      - name: Assert RL_AUTH is bound
        run: grep -q "RL_AUTH" dist/server/wrangler.json || { echo "::error::RL_AUTH missing from generated config — the mint per-IP cap would silently fail open"; exit 1; }
        working-directory: packages/web
      # REAL deploy (tag push, or a dispatch with dry_run=false): migrate D1 then upload.
      - name: Apply D1 migrations
        if: needs.prep.outputs.dry_run == 'false'
        run: pnpm exec wrangler d1 migrations apply ${{ needs.prep.outputs.db_name }} --env ${{ needs.prep.outputs.environment }} --remote
        working-directory: packages/web
      - name: Deploy
        if: needs.prep.outputs.dry_run == 'false'
        run: pnpm exec wrangler deploy -c dist/server/wrangler.json
        working-directory: packages/web
      # DRY RUN: validate the env-baked config + bundle without uploading (no secrets required).
      - name: Deploy (dry run)
        if: needs.prep.outputs.dry_run != 'false'
        run: pnpm exec wrangler deploy -c dist/server/wrangler.json --dry-run
        working-directory: packages/web

  # Cut a GitHub Release for the tag, with that version's CHANGELOG section as the notes. Runs LAST and
  # only after publish-cli (so transitively after the Worker deploy): a Release is the "fully shipped"
  # marker, so it must never exist for a release that failed to publish or deploy. It's also what the
  # CHANGELOG's `[x.y.z]: …/releases/tag/vX.Y.Z` footer links resolve to. `contents: write` is scoped to
  # THIS job; the top-level default stays read-only. gh + awk, not a third-party action — no new
  # supply-chain dependency, and the notes come from the CHANGELOG we already curate (one source).
  github-release:
    needs: [prep, publish-cli]
    if: github.event_name == 'push' && needs.prep.outputs.dry_run == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create/edit the GitHub Release for this tag
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cut the GitHub Release from the CHANGELOG
        # Never inline the tag/version into the script — a ref name is attacker-influenced (same reason
        # the Stamp version step passes VERSION via env). The notes go through a file, so backticks and
        # asterisks in the changelog are never reparsed by the shell.
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          notes="$RUNNER_TEMP/notes.md"
          # Print the body of this version's section: everything between its `## [x.y.z]` header and the
          # next section header (or the `[x.y.z]: http…` link-ref block, for the oldest entry).
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { grab = 1; next }
            grab && /^## \[/        { exit }
            grab && /^\[.*\]: http/ { exit }
            grab                    { print }
          ' CHANGELOG.md > "$notes"
          # Drop leading blank lines (the section header is followed by one) for a tidy release body.
          sed -i -e '/./,$!d' "$notes"

          if gh release view "$TAG" >/dev/null 2>&1; then
            # Idempotent re-run (e.g. a retried release): refresh title + notes, don't recreate.
            if [ -s "$notes" ]; then
              gh release edit "$TAG" --title "$TAG" --notes-file "$notes"
            else
              echo "::warning::No CHANGELOG section for $VERSION; leaving the existing release as-is."
            fi
          else
            flags=(--title "$TAG" --verify-tag)
            # A pre-release suffix (v1.2.0-rc.1) is flagged, so GitHub doesn't mark it "Latest".
            case "$VERSION" in *-*) flags+=(--prerelease) ;; esac
            if [ -s "$notes" ]; then
              flags+=(--notes-file "$notes")
            else
              echo "::warning::No CHANGELOG section for $VERSION; using auto-generated notes."
              flags+=(--generate-notes)
            fi
            gh release create "$TAG" "${flags[@]}"
          fi
